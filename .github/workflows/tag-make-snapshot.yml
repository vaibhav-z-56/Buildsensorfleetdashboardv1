name: Tag Make snapshot
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name, e.g. v2"
        required: true
jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: figma-incoming   # always tags the Figma branch
          fetch-depth: 0
      - name: Create annotated tag at HEAD
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "${{ github.event.inputs.tag }}" -m "snapshot: ${{ github.event.inputs.tag }}"
          git push origin "${{ github.event.inputs.tag }}"
